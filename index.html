<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senin için 🌻</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to top, #fceabb, #f8b500);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    text-align: center;
    overflow-x: hidden;
    padding-top: 20px;
  }

  .card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    width: 90%;
    max-width: 600px;
    text-align: center;
    position: relative;
    align-items: center;
    padding: 60px 40px 200px 40px;
  }

  h1 {
    margin-bottom: 20px;
    font-size: 1.5rem;
  }

  #emoji {
    font-size: 50px;
    display: inline-block;
    animation: spin 8s linear infinite;
    margin-bottom: 15px;
  }

  button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    background: #ffeb3b;
    color: black;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    transition: background 0.4s ease;
  }

  button:hover {
    background: #fdd835;
  }

  #text {
    font-size: 20px;
    font-weight: bold;
    min-height: 30px;
    transition: opacity 0.6s ease;
  }

  .sunflower {
    width: 200px;
    height: 200px;
    margin: 60px auto 20px auto;
    cursor: pointer;
    display: none;
    position: relative;
  }

  .petal {
    position: absolute;
    width: 36px;
    height: 78px;
    background: #ffe033;
    border-radius: 50% 50% 20% 20%;
    top: 0;
    left: calc(50% - 18px);
    transform-origin: 18px 100px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    transition: transform 0.8s ease, opacity 0.8s ease;
  }

  .center {
    position: absolute;
    width: 65px;
    height: 65px;
    background: radial-gradient(circle, #2a1000, #6b3a00);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 3px 8px rgba(0,0,0,0.4);
    z-index: 2;
  }

  #finalEmojis {
    font-size: 40px;
    margin-top: 20px;
    display: none;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @media (max-width: 480px) {
    .card {
      padding: 40px 20px 180px 20px;
    }
    #emoji {
      font-size: 40px;
    }
    h1 {
      font-size: 1.3rem;
    }
    button {
      font-size: 16px;
      padding: 10px 20px;
    }
    .sunflower {
      width: 160px;
      height: 160px;
      margin-top: 40px;
    }
    .petal {
      width: 30px;
      height: 62px;
      left: calc(50% - 15px);
      transform-origin: 15px 80px;
    }
    .center {
      width: 55px;
      height: 55px;
    }
  }
</style>
</head>
<body>

<div class="card">
  <div id="emoji">🌻</div>
  <h1>Ayçiçeği falına bakmak ister misin :)</h1>
  <p id="text">Başlamak için tıkla!</p>
  <button id="nextBtn">Tıkla</button>

  <div class="sunflower" id="sunflower">
    <div class="center"></div>
  </div>

  <div id="finalEmojis"></div>
</div>

<script>
  const messages = [
    "Avrupa Yakasının En İkonik İş Analisti!",
    "Ayçiçeği sevdiğini söylemiştin...",
    "Ben de dedim ki...",
    "Belki seni biraz gülümsetirim ...",
    "Çünkü seninle konuşmak...",
    "Bugünlerde bana en keyif veren şey",
    "Doğum gününü kutluyorum <333"
  ];

  const text = document.getElementById('text');
  const nextBtn = document.getElementById('nextBtn');
  const sunflower = document.getElementById('sunflower');
  const finalEmojisDiv = document.getElementById('finalEmojis');

  let messageIndex = 0;

  const petals = [];
  const totalPetals = 7;
  let plucked = 0;
  const petalResults = ["Seviyor", "Sevmiyor", "Seviyor", "Sevmiyor", "Seviyor", "Sevmiyor", "Seviyor"]; 
  const finalEmojis = ["🎉", "💛", "💐", "🎉", "💛", "💐", "🎉", "💛"];

  for(let i=0; i<totalPetals; i++){
    const petal = document.createElement('div');
    petal.classList.add('petal');
    const angle = i * (360 / totalPetals);
  petal.style.transform = `rotate(${angle}deg)`;
    sunflower.appendChild(petal);
    petals.push(petal);
  }

  function nextMessage(){
    if(messageIndex < messages.length){
      text.style.opacity = 0;
      setTimeout(() => {
        text.innerText = messages[messageIndex];
        text.style.opacity = 1;
        messageIndex++;
        if(messageIndex === messages.length){
          sunflower.style.display = 'block';
          nextBtn.style.display = 'none';
          text.innerText = "Şimdi ayçiçeğine tıkla 🌻";
        }
      }, 400);
    }
  }

  nextBtn.addEventListener('click', nextMessage);

  function pluckPetal(){
    if(plucked < petals.length){
      const petal = petals[plucked];
      const baseAngle = plucked * (360 / totalPetals);
      petal.style.transform = `rotate(${baseAngle}deg) translateY(-200px)`;
      petal.style.opacity = '0';

      const currentIndex = plucked;
      plucked++;

      text.style.opacity = 0;

      setTimeout(() => {

        if(currentIndex === petals.length - 1){
          text.innerText = "Seviyor ❤️";

          setTimeout(() => {
            finalEmojisDiv.style.display = 'block';
            finalEmojisDiv.innerText = finalEmojis.join(" ");
          }, 800);
        }
        else {
          text.innerText = petalResults[currentIndex];
        }

        text.style.opacity = 1;
      }, 400);
    }
  }

  sunflower.addEventListener('click', pluckPetal);
</script>

</body>
</html>
